<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势识别 - 麦克纳姆轮控制</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #0f3460;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(15, 52, 96, 0.6);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.2);
        }

        .card-title {
            font-size: 1.2rem;
            color: #00d9ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .status-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.active {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-indicator.inactive {
            background: #ff4444;
        }

        .gesture-display {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            background: rgba(0, 217, 255, 0.1);
            border-radius: 10px;
        }

        .gesture-name {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 10px;
        }

        .gesture-desc {
            font-size: 1.2rem;
            color: #aaa;
        }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .control-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
        }

        .control-btn.active {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #000;
        }

        .control-btn i {
            font-size: 1.5rem;
        }

        .settings-section {
            margin: 20px 0;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setting-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-label i {
            color: #00d9ff;
            width: 20px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            max-width: 200px;
        }

        .slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #0f3460;
            border-radius: 3px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #00d9ff;
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-value {
            min-width: 50px;
            text-align: right;
            color: #00d9ff;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: rgba(0, 217, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 5px;
        }

        .logs-container {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
            margin: 15px 0;
        }

        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }

        .log-time {
            color: #666;
            margin-right: 10px;
        }

        .log-level {
            margin-right: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .log-level.INFO {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .log-level.WARNING {
            background: rgba(255, 200, 0, 0.2);
            color: #ffc800;
        }

        .log-level.ERROR {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .gesture-legend {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .legend-item.current {
            background: rgba(0, 217, 255, 0.2);
            border: 1px solid #00d9ff;
        }

        .legend-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 217, 255, 0.2);
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .control-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> 手势识别 - 麦克纳姆轮控制系统</h1>
        </div>

        <div class="main-grid">
            <!-- 左侧：视频流和控制 -->
            <div class="left-panel">
                <div class="card">
                    <div class="card-title">
                        <i class="fas fa-video"></i> 实时检测画面
                    </div>
                    <div class="video-container">
                        <img src="/video_feed" alt="Video Stream" id="videoStream">
                        <div class="status-overlay">
                            <span class="status-indicator active" id="statusIndicator"></span>
                            <span id="connectionStatus">已连接</span>
                        </div>
                    </div>

                    <div class="gesture-display">
                        <div class="gesture-name" id="currentGesture">停止</div>
                        <div class="gesture-desc" id="gestureDesc">Stop</div>
                    </div>

                    <div class="card-title" style="margin-top: 20px;">
                        <i class="fas fa-gamepad"></i> 手动控制
                    </div>
                    <div class="control-panel">
                        <button class="control-btn" data-action="FORWARD">
                            <i class="fas fa-arrow-up"></i>
                            <span>前进</span>
                        </button>
                        <button class="control-btn" data-action="LEFT">
                            <i class="fas fa-arrow-left"></i>
                            <span>左移</span>
                        </button>
                        <button class="control-btn" data-action="RIGHT">
                            <i class="fas fa-arrow-right"></i>
                            <span>右移</span>
                        </button>
                        <button class="control-btn" data-action="BACKWARD">
                            <i class="fas fa-arrow-down"></i>
                            <span>后退</span>
                        </button>
                        <button class="control-btn" data-action="ROTATE_LEFT">
                            <i class="fas fa-undo"></i>
                            <span>左旋转</span>
                        </button>
                        <button class="control-btn" data-action="ROTATE_RIGHT">
                            <i class="fas fa-redo"></i>
                            <span>右旋转</span>
                        </button>
                    </div>
                    <button class="control-btn" style="width: 100%; margin-top: 10px; background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);" data-action="stop">
                        <i class="fas fa-stop"></i>
                        <span>停止</span>
                    </button>
                </div>
            </div>

            <!-- 右侧：状态和设置 -->
            <div class="right-panel">
                <div class="card">
                    <div class="card-title">
                        <i class="fas fa-sliders-h"></i> 参数设置
                    </div>
                    <div class="settings-section">
                        <div class="setting-row">
                            <div class="setting-label">
                                <i class="fas fa-tachometer-alt"></i>
                                <span>速度</span>
                            </div>
                            <div class="slider-container">
                                <input type="range" class="slider" id="speedSlider" min="0" max="100" value="70">
                                <span class="slider-value" id="speedValue">70%</span>
                            </div>
                        </div>
                        <div class="setting-row">
                            <div class="setting-label">
                                <i class="fas fa-crosshairs"></i>
                                <span>置信度阈值</span>
                            </div>
                            <div class="slider-container">
                                <input type="range" class="slider" id="thresholdSlider" min="10" max="100" value="50">
                                <span class="slider-value" id="thresholdValue">0.50</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">
                        <i class="fas fa-chart-bar"></i> 系统状态
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="fpsValue">0</div>
                            <div class="stat-label">FPS</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="confidenceValue">0.00</div>
                            <div class="stat-label">置信度</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="totalDetections">0</div>
                            <div class="stat-label">总检测次数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="modelStatus">-</div>
                            <div class="stat-label">模型状态</div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">
                        <i class="fas fa-hand-paper"></i> 手势映射
                    </div>
                    <div class="gesture-legend" id="gestureLegend">
                        <div class="legend-item" data-gesture="STOP">
                            <div class="legend-icon"><i class="fas fa-hand"></i></div>
                            <span>停止</span>
                        </div>
                        <div class="legend-item" data-gesture="FORWARD">
                            <div class="legend-icon"><i class="fas fa-thumbs-up"></i></div>
                            <span>前进</span>
                        </div>
                        <div class="legend-item" data-gesture="BACKWARD">
                            <div class="legend-icon"><i class="fas fa-thumbs-down"></i></div>
                            <span>后退</span>
                        </div>
                        <div class="legend-item" data-gesture="LEFT">
                            <div class="legend-icon"><i class="fas fa-hand-point-left"></i></div>
                            <span>左移</span>
                        </div>
                        <div class="legend-item" data-gesture="RIGHT">
                            <div class="legend-icon"><i class="fas fa-hand-point-right"></i></div>
                            <span>右移</span>
                        </div>
                        <div class="legend-item" data-gesture="ROTATE_LEFT">
                            <div class="legend-icon"><i class="far fa-circle"></i></div>
                            <span>左旋转</span>
                        </div>
                        <div class="legend-item" data-gesture="ROTATE_RIGHT">
                            <div class="legend-icon"><i class="fas fa-hand-victory"></i></div>
                            <span>右旋转</span>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">
                        <i class="fas fa-list"></i> 运行日志
                    </div>
                    <div class="logs-container" id="logsContainer">
                        <div class="log-item">等待系统启动...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 状态更新
        let currentGesture = 'STOP';
        let updateInterval = null;

        // 更新系统状态
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const result = await response.json();

                if (result.success) {
                    const data = result.data;

                    // 更新手势显示
                    document.getElementById('currentGesture').textContent = gestureToChinese(data.current_gesture);
                    document.getElementById('gestureDesc').textContent = getGestureDesc(data.current_gesture);

                    // 更新统计
                    document.getElementById('fpsValue').textContent = data.fps.toFixed(1);
                    document.getElementById('confidenceValue').textContent = data.confidence.toFixed(2);
                    document.getElementById('totalDetections').textContent = data.total_detections;

                    // 更新模型状态
                    document.getElementById('modelStatus').textContent = data.model_loaded ? '已加载' : '未加载';
                    document.getElementById('modelStatus').style.color = data.model_loaded ? '#00d9ff' : '#ff4444';

                    // 更新速度滑块
                    document.getElementById('speedSlider').value = data.speed_percent;
                    document.getElementById('speedValue').textContent = data.speed_percent + '%';

                    // 高亮当前手势
                    document.querySelectorAll('.legend-item').forEach(item => {
                        item.classList.remove('current');
                        if (item.dataset.gesture === data.current_gesture) {
                            item.classList.add('current');
                        }
                    });

                    currentGesture = data.current_gesture;
                }
            } catch (error) {
                console.error('更新状态失败:', error);
            }
        }

        // 更新日志
        async function updateLogs() {
            try {
                const response = await fetch('/api/logs');
                const result = await response.json();

                if (result.success) {
                    const container = document.getElementById('logsContainer');
                    container.innerHTML = '';

                    result.data.reverse().forEach(log => {
                        const div = document.createElement('div');
                        div.className = 'log-item';
                        div.innerHTML = `
                            <span class="log-time">${log.time}</span>
                            <span class="log-level ${log.level}">${log.level}</span>
                            <span>${log.message}</span>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (error) {
                console.error('更新日志失败:', error);
            }
        }

        // 手势名称转换
        function gestureToChinese(gesture) {
            const map = {
                'STOP': '停止',
                'FORWARD': '前进',
                'BACKWARD': '后退',
                'LEFT': '左移',
                'RIGHT': '右移',
                'ROTATE_LEFT': '左旋转',
                'ROTATE_RIGHT': '右旋转'
            };
            return map[gesture] || gesture;
        }

        // 获取手势描述
        function getGestureDesc(gesture) {
            const map = {
                'STOP': 'Stop',
                'FORWARD': 'Move Forward',
                'BACKWARD': 'Move Backward',
                'LEFT': 'Move Left',
                'RIGHT': 'Move Right',
                'ROTATE_LEFT': 'Rotate Left',
                'ROTATE_RIGHT': 'Rotate Right'
            };
            return map[gesture] || gesture;
        }

        // 控制按钮事件
        document.querySelectorAll('.control-btn[data-action]').forEach(btn => {
            btn.addEventListener('click', async () => {
                const action = btn.dataset.action;
                try {
                    const response = await fetch('/api/control', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action })
                    });
                    const result = await response.json();

                    if (result.success) {
                        // 视觉反馈
                        btn.classList.add('active');
                        setTimeout(() => btn.classList.remove('active'), 200);
                    }
                } catch (error) {
                    console.error('控制失败:', error);
                }
            });
        });

        // 速度滑块
        document.getElementById('speedSlider').addEventListener('input', function() {
            document.getElementById('speedValue').textContent = this.value + '%';
        });

        document.getElementById('speedSlider').addEventListener('change', async function() {
            try {
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ speed: parseInt(this.value) })
                });
            } catch (error) {
                console.error('设置速度失败:', error);
            }
        });

        // 阈值滑块
        document.getElementById('thresholdSlider').addEventListener('input', function() {
            document.getElementById('thresholdValue').textContent = (this.value / 100).toFixed(2);
        });

        document.getElementById('thresholdSlider').addEventListener('change', async function() {
            try {
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ threshold: this.value / 100 })
                });
            } catch (error) {
                console.error('设置阈值失败:', error);
            }
        });

        // 启动状态更新
        function startUpdates() {
            updateInterval = setInterval(() => {
                updateStatus();
                updateLogs();
            }, 1000);
        }

        // 页面加载完成后启动
        window.addEventListener('load', () => {
            startUpdates();
            updateStatus();
            updateLogs();
        });

        // 页面卸载时停止更新
        window.addEventListener('beforeunload', () => {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });
    </script>
</body>
</html>
