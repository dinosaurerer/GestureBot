<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange 检测 - 麦克纳姆轮控制</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #0f3460;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            color: #ff8c00;
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        .header .badge {
            display: inline-block;
            background: rgba(255, 140, 0, 0.2);
            color: #ff8c00;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(15, 52, 96, 0.6);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .card-title {
            font-size: 1.2rem;
            color: #ff8c00;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 3px solid #ff8c00;
            box-shadow: 0 0 30px rgba(255, 140, 0, 0.3);
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .status-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.active {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-indicator.inactive {
            background: #ff4444;
        }

        .status-indicator.detecting {
            background: #ff8c00;
            box-shadow: 0 0 10px #ff8c00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .detection-status {
            text-align: center;
            padding: 25px;
            margin: 20px 0;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .detection-status.detecting {
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.3) 0%, rgba(255, 69, 0, 0.3) 100%);
            border: 2px solid #ff8c00;
            animation: border-pulse 1.5s infinite;
        }

        .detection-status.waiting {
            background: rgba(15, 52, 96, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes border-pulse {
            0%, 100% { border-color: #ff8c00; }
            50% { border-color: #ff6600; }
        }

        .detection-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .detection-icon.detecting {
            color: #ff8c00;
            animation: bounce 1s infinite;
        }

        .detection-icon.waiting {
            color: #666;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .detection-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .detection-text.detecting {
            color: #ff8c00;
        }

        .detection-text.waiting {
            color: #999;
        }

        .detection-subtext {
            font-size: 1rem;
            color: #aaa;
        }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .control-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 140, 0, 0.3);
        }

        .control-btn.active {
            background: linear-gradient(135deg, #ff8c00 0%, #ff6600 100%);
            color: #000;
        }

        .control-btn i {
            font-size: 1.5rem;
        }

        .settings-section {
            margin: 20px 0;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setting-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-label i {
            color: #ff8c00;
            width: 20px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            max-width: 200px;
        }

        .slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #0f3460;
            border-radius: 3px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #ff8c00;
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-value {
            min-width: 50px;
            text-align: right;
            color: #ff8c00;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: rgba(255, 140, 0, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff8c00;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 5px;
        }

        .logs-container {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
            margin: 15px 0;
        }

        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }

        .log-time {
            color: #666;
            margin-right: 10px;
        }

        .log-level {
            margin-right: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .log-level.INFO {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .log-level.WARNING {
            background: rgba(255, 200, 0, 0.2);
            color: #ffc800;
        }

        .log-level.ERROR {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .orange-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff8c00 0%, #ff6600 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.4);
            opacity: 0.3;
            transition: all 0.3s;
        }

        .orange-icon.active {
            opacity: 1;
            transform: scale(1.1);
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1.1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .control-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-lemon"></i> Orange 检测 - 麦克纳姆轮控制 <span class="badge">测试版</span></h1>
        </div>

        <div class="main-grid">
            <!-- 左侧：视频流和控制 -->
            <div class="left-panel">
                <div class="card">
                    <div class="card-title">
                        <i class="fas fa-video"></i> 实时检测画面
                    </div>
                    <div class="video-container">
                        <img src="/video_feed" alt="Video Stream" id="videoStream">
                        <div class="status-overlay">
                            <span class="status-indicator" id="statusIndicator"></span>
                            <span id="connectionStatus">已连接</span>
                        </div>
                    </div>

                    <div class="detection-status waiting" id="detectionStatus">
                        <div class="detection-icon waiting" id="detectionIcon">
                            <i class="fas fa-search"></i>
                        </div>
                        <div class="detection-text waiting" id="detectionText">等待检测 Orange...</div>
                        <div class="detection-subtext" id="detectionSubtext">显示 Orange 到摄像头前</div>
                    </div>

                    <div class="card-title" style="margin-top: 20px;">
                        <i class="fas fa-gamepad"></i> 手动控制
                    </div>
                    <div class="control-panel">
                        <button class="control-btn" data-action="FORWARD">
                            <i class="fas fa-arrow-up"></i>
                            <span>前进</span>
                        </button>
                        <button class="control-btn" data-action="LEFT">
                            <i class="fas fa-arrow-left"></i>
                            <span>左移</span>
                        </button>
                        <button class="control-btn" data-action="RIGHT">
                            <i class="fas fa-arrow-right"></i>
                            <span>右移</span>
                        </button>
                        <button class="control-btn" data-action="BACKWARD">
                            <i class="fas fa-arrow-down"></i>
                            <span>后退</span>
                        </button>
                        <button class="control-btn" data-action="ROTATE_LEFT">
                            <i class="fas fa-undo"></i>
                            <span>左旋转</span>
                        </button>
                        <button class="control-btn" data-action="ROTATE_RIGHT">
                            <i class="fas fa-redo"></i>
                            <span>右旋转</span>
                        </button>
                    </div>
                    <button class="control-btn" style="width: 100%; margin-top: 10px; background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);" data-action="stop">
                        <i class="fas fa-stop"></i>
                        <span>停止</span>
                    </button>
                </div>
            </div>

            <!-- 右侧：状态和设置 -->
            <div class="right-panel">
                <div class="card">
                    <div class="card-title">
                        <i class="fas fa-sliders-h"></i> 参数设置
                    </div>
                    <div class="settings-section">
                        <div class="setting-row">
                            <div class="setting-label">
                                <i class="fas fa-tachometer-alt"></i>
                                <span>速度</span>
                            </div>
                            <div class="slider-container">
                                <input type="range" class="slider" id="speedSlider" min="0" max="100" value="70">
                                <span class="slider-value" id="speedValue">70%</span>
                            </div>
                        </div>
                        <div class="setting-row">
                            <div class="setting-label">
                                <i class="fas fa-crosshairs"></i>
                                <span>置信度阈值</span>
                            </div>
                            <div class="slider-container">
                                <input type="range" class="slider" id="thresholdSlider" min="10" max="100" value="50">
                                <span class="slider-value" id="thresholdValue">0.50</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">
                        <i class="fas fa-chart-bar"></i> 系统状态
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="fpsValue">0</div>
                            <div class="stat-label">FPS</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="confidenceValue">0.00</div>
                            <div class="stat-label">置信度</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="totalDetections">0</div>
                            <div class="stat-label">检测次数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="modelStatus">-</div>
                            <div class="stat-label">模型状态</div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">
                        <i class="fas fa-lemon"></i> 检测说明
                    </div>
                    <div style="padding: 15px; background: rgba(255, 140, 0, 0.1); border-radius: 10px; font-size: 0.9rem;">
                        <p style="margin-bottom: 10px;"><i class="fas fa-info-circle" style="color: #ff8c00;"></i> <strong>检测目标:</strong> Orange (橘子)</p>
                        <p style="margin-bottom: 10px;"><i class="fas fa-info-circle" style="color: #ff8c00;"></i> <strong>模型:</strong> YOLO11n.pt (COCO 数据集)</p>
                        <p><i class="fas fa-info-circle" style="color: #ff8c00;"></i> <strong>控制逻辑:</strong> 检测到 Orange 时小车前进，否则停止</p>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">
                        <i class="fas fa-list"></i> 运行日志
                    </div>
                    <div class="logs-container" id="logsContainer">
                        <div class="log-item">等待系统启动...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Orange 图标 -->
    <div class="orange-icon" id="orangeIcon">
        <i class="fas fa-lemon"></i>
    </div>

    <script>
        let currentAction = 'STOP';
        let updateInterval = null;

        // 更新系统状态
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const result = await response.json();

                if (result.success) {
                    const data = result.data;

                    // 更新检测状态
                    const detecting = data.orange_detected && data.confidence > 0.5;
                    updateDetectionUI(detecting, data.confidence);

                    // 更新统计
                    document.getElementById('fpsValue').textContent = data.fps.toFixed(1);
                    document.getElementById('confidenceValue').textContent = data.confidence.toFixed(2);
                    document.getElementById('totalDetections').textContent = data.total_detections;

                    // 更新模型状态
                    document.getElementById('modelStatus').textContent = data.model_loaded ? '已加载' : '未加载';
                    document.getElementById('modelStatus').style.color = data.model_loaded ? '#ff8c00' : '#ff4444';

                    // 更新速度滑块
                    document.getElementById('speedSlider').value = data.speed_percent;
                    document.getElementById('speedValue').textContent = data.speed_percent + '%';

                    currentAction = data.current_gesture;
                }
            } catch (error) {
                console.error('更新状态失败:', error);
            }
        }

        // 更新检测状态UI
        function updateDetectionUI(detecting, confidence) {
            const statusDiv = document.getElementById('detectionStatus');
            const iconDiv = document.getElementById('detectionIcon');
            const textDiv = document.getElementById('detectionText');
            const subtextDiv = document.getElementById('detectionSubtext');
            const orangeIcon = document.getElementById('orangeIcon');

            if (detecting) {
                statusDiv.className = 'detection-status detecting';
                iconDiv.className = 'detection-icon detecting';
                iconDiv.innerHTML = '<i class="fas fa-check-circle"></i>';
                textDiv.className = 'detection-text detecting';
                textDiv.textContent = '检测到 Orange!';
                subtextDiv.textContent = `置信度: ${confidence.toFixed(2)} | 小车前进中`;
                orangeIcon.classList.add('active');
            } else {
                statusDiv.className = 'detection-status waiting';
                iconDiv.className = 'detection-icon waiting';
                iconDiv.innerHTML = '<i class="fas fa-search"></i>';
                textDiv.className = 'detection-text waiting';
                textDiv.textContent = '等待检测 Orange...';
                subtextDiv.textContent = '显示 Orange 到摄像头前';
                orangeIcon.classList.remove('active');
            }
        }

        // 更新日志
        async function updateLogs() {
            try {
                const response = await fetch('/api/logs');
                const result = await response.json();

                if (result.success) {
                    const container = document.getElementById('logsContainer');
                    container.innerHTML = '';

                    result.data.reverse().forEach(log => {
                        const div = document.createElement('div');
                        div.className = 'log-item';
                        div.innerHTML = `
                            <span class="log-time">${log.time}</span>
                            <span class="log-level ${log.level}">${log.level}</span>
                            <span>${log.message}</span>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (error) {
                console.error('更新日志失败:', error);
            }
        }

        // 控制按钮事件
        document.querySelectorAll('.control-btn[data-action]').forEach(btn => {
            btn.addEventListener('click', async () => {
                const action = btn.dataset.action;
                try {
                    const response = await fetch('/api/control', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action })
                    });
                    const result = await response.json();

                    if (result.success) {
                        // 视觉反馈
                        btn.classList.add('active');
                        setTimeout(() => btn.classList.remove('active'), 200);
                    }
                } catch (error) {
                    console.error('控制失败:', error);
                }
            });
        });

        // 速度滑块
        document.getElementById('speedSlider').addEventListener('input', function() {
            document.getElementById('speedValue').textContent = this.value + '%';
        });

        document.getElementById('speedSlider').addEventListener('change', async function() {
            try {
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ speed: parseInt(this.value) })
                });
            } catch (error) {
                console.error('设置速度失败:', error);
            }
        });

        // 阈值滑块
        document.getElementById('thresholdSlider').addEventListener('input', function() {
            document.getElementById('thresholdValue').textContent = (this.value / 100).toFixed(2);
        });

        document.getElementById('thresholdSlider').addEventListener('change', async function() {
            try {
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ threshold: this.value / 100 })
                });
            } catch (error) {
                console.error('设置阈值失败:', error);
            }
        });

        // 启动状态更新
        function startUpdates() {
            updateInterval = setInterval(() => {
                updateStatus();
                updateLogs();
            }, 1000);
        }

        // 页面加载完成后启动
        window.addEventListener('load', () => {
            startUpdates();
            updateStatus();
            updateLogs();
        });

        // 页面卸载时停止更新
        window.addEventListener('beforeunload', () => {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });
    </script>
</body>
</html>
